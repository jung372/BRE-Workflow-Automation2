<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주요 사이트 공지 모니터링 대시보드</title>
  <meta name="description" content="기후에너지환경부 전기위원회 공지사항 신규 게시글 모니터링 대시보드" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #21262d;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --blue:        #3b82f6;
      --green:       #10b981;
      --amber:       #f59e0b;
      --red:         #ef4444;
      --glow-blue:   rgba(59,130,246,0.25);
      --glow-green:  rgba(16,185,129,0.25);
      --radius:      16px;
    }

    body {
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 배경 파티클 효과 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 10% 20%, rgba(59,130,246,.08) 0%, transparent 70%),
        radial-gradient(ellipse 500px 350px at 90% 80%, rgba(16,185,129,.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    /* ── 헤더 ── */
    header { text-align: center; margin-bottom: 24px; }
    .header-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(59,130,246,.12); border: 1px solid rgba(59,130,246,.3);
      color: var(--blue); border-radius: 999px;
      font-size: 11px; font-weight: 500; padding: 4px 12px;
      margin-bottom: 12px;
      animation: fadeSlideDown .5s ease both;
    }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--blue);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }
    h1 {
      font-size: clamp(20px, 3vw, 24px); font-weight: 700; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e6edf3 0%, #8b949e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeSlideDown .6s ease .1s both;
    }
    .subtitle {
      margin-top: 6px; color: var(--text-muted); font-size: 13px;
      animation: fadeSlideDown .6s ease .2s both;
    }

    /* ── 컨트롤 바 ── */
    .control-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 28px;
      animation: fadeSlideDown .5s ease .3s both;
    }
    .last-check { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .last-check .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500;
      cursor: pointer; border: none; transition: all .2s;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,.4); }
    .btn-ghost {
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }
    .spin { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 카드 그리드 ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 30px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 16px 12px;
      position: relative; overflow: hidden;
      transition: transform .25s, box-shadow .25s;
      animation: fadeSlideUp .5s ease both;
    }
    .card:nth-child(2) { animation-delay: .1s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,.3); }

    /* 카드 상단 색상 바 */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--card-color, var(--blue));
      border-radius: var(--radius) var(--radius) 0 0;
    }
    /* 배경 glow */
    .card::after {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 180px; height: 180px; border-radius: 50%;
      background: var(--card-glow, var(--glow-blue));
      pointer-events: none;
    }
    .card[data-id="result"] { --card-color: var(--green); --card-glow: var(--glow-green); }
    .card[data-id="notice"] { --card-color: var(--blue); --card-glow: var(--glow-blue); }
    .card[data-id="nie_notice"] { --card-color: var(--amber); --card-glow: rgba(245,158,11,0.25); }
    .card[data-id="kepco_notice"] { --card-color: #f97316; --card-glow: rgba(249,115,22,0.25); }
    .card[data-id="eiass_wind"] { --card-color: #0ea5e9; --card-glow: rgba(14,165,233,0.25); }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
    .card-icon { font-size: 28px; line-height: 1; }
    .card-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .card-url  { font-size: 12px; color: var(--text-muted); }

    /* 신규 게시글 수 */
    .new-count-wrap { margin-bottom: 12px; }
    .new-count-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .new-count {
      font-size: 32px; font-weight: 700; line-height: 1;
      color: var(--text);
      transition: color .3s;
    }
    .new-count.has-new { color: var(--amber); }
    .new-count.is-error { color: var(--red); font-size: 24px; }

    .new-count-link {
      display: inline-block;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform .2s;
    }
    .new-count-link:hover { transform: scale(1.04); }
    .new-count-link:hover .new-count { text-shadow: 0 0 20px rgba(245,158,11,.5); }

    /* 새 글 목록 */
    .new-items { margin-top: 14px; }
    .new-item {
      display: flex; align-items: baseline; gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--surface2);
      animation: fadeSlideRight .3s ease both;
    }
    .new-item:last-child { border-bottom: none; }
    .new-item-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); flex-shrink: 0; margin-top: 5px; }
    .new-item a {
      font-size: 13px; color: var(--text); text-decoration: none;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }
    .new-item a:hover { color: var(--blue); }
    .new-item-date { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }

    .no-new-msg { font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .check-icon { font-size: 18px; }

    .error-msg { font-size: 13px; color: var(--red); margin-top: 8px; }

    /* 카드 푸터 */
    .card-footer { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--surface2); display: flex; justify-content: space-between; align-items: center; }
    .total-count { font-size: 10px; color: var(--text-muted); }
    .visit-link {
      font-size: 11px; color: var(--text-muted); text-decoration: none;
      display: flex; align-items: center; gap: 4px;
      transition: color .2s;
    }
    .visit-link:hover { color: var(--text); }

    /* ── 통계 바 ── */
    .stats-bar {
      display: flex; gap: 16px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 20px;
      margin-bottom: 16px;
      animation: fadeSlideUp .5s ease .25s both;
    }
    .stat { flex: 1; min-width: 100px; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
    .stat-value { font-size: 18px; font-weight: 700; }
    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: var(--green); }

    /* ── 로딩 스켈레톤 ── */
    .skeleton {
      border-radius: 4px; overflow: hidden;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .sk-count { height: 32px; width: 60px; margin-bottom: 8px; }
    .sk-line  { height: 12px; width: 100%; margin-bottom: 6px; }
    .sk-line.short { width: 60%; }

    /* ── 애니메이션 ── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideRight {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── 토스트 알림 ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 12px 24px; border-radius: 999px;
      font-size: 14px; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── 자동 새로고침 바 ── */
    .auto-bar-wrap { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
    .auto-bar-bg { flex: 1; max-width: 120px; height: 4px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
    .auto-bar-fill { height: 100%; background: var(--blue); border-radius: 999px; width: 100%; transition: width 1s linear; }

    footer { text-align: center; color: var(--text-muted); font-size: 12px; margin-top: 24px; animation: fadeSlideUp .5s ease .4s both; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- 헤더 -->
  <header>
    <div class="header-badge"><div class="pulse-dot"></div> 실시간 모니터링 활성</div>
    <h1>주요 사이트 공지 모니터링 대시보드</h1>
    <p class="subtitle">기후에너지환경부 전기위원회 공지사항 신규 게시글을 자동으로 감지합니다</p>
  </header>

  <!-- 컨트롤 바 -->
  <div class="control-bar">
    <div class="last-check" style="flex-direction:column; align-items:flex-start; gap:4px;">
      <div style="display:flex; align-items:center; gap:6px;">
        <div class="dot" id="statusDot"></div>
        <span id="lastCheck">서버에서 정보를 가져오는 중…</span>
      </div>
      <div id="updatingIndicator" style="display:none; align-items:center; gap:6px; color:var(--amber); font-size:12px;">
        <span class="spin" style="display:inline-block; font-size:14px;">↻</span> 백그라운드에서 실시간 데이터 갱신 중... (30~60초 소요)
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="auto-bar-wrap">
        <span>자동갱신</span>
        <div class="auto-bar-bg"><div class="auto-bar-fill" id="autoBar"></div></div>
        <span id="autoCountdown">60s</span>
      </div>
      <button class="btn btn-ghost" id="btnReset" onclick="resetBaseline()">🗑 기준 초기화</button>
      <button class="btn btn-primary" id="btnRefresh" onclick="refresh()">
        <span id="refreshIcon">↻</span> 새로고침
      </button>
    </div>
  </div>

  <!-- 통계 바 -->
  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="stat">
      <div class="stat-label">전체 신규 게시글</div>
      <div class="stat-value amber" id="statTotal">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">모니터링 사이트</div>
      <div class="stat-value green" id="statSites">4</div>
    </div>
    <div class="stat">
      <div class="stat-label">마지막 확인</div>
      <div class="stat-value" style="font-size:16px;" id="statTime">—</div>
    </div>
  </div>

  <!-- 카드 영역 -->
  <div class="cards" id="cards">
    <!-- 스켈레톤 (사이트 4개에 맞게) -->
    <div class="card" id="skel1">
      <div class="card-header">
        <div>
          <div class="skeleton sk-line short" style="width:40px;height:28px;margin-bottom:10px;"></div>
          <div class="skeleton sk-line short" style="width:120px;"></div>
        </div>
      </div>
      <div class="skeleton sk-count"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line short"></div>
    </div>
    <div class="card" id="skel2">
      <div class="card-header">
        <div>
          <div class="skeleton sk-line short" style="width:40px;height:28px;margin-bottom:10px;"></div>
          <div class="skeleton sk-line short" style="width:140px;"></div>
        </div>
      </div>
      <div class="skeleton sk-count"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line short"></div>
    </div>
    <div class="card" id="skel3">
      <div class="card-header">
        <div>
          <div class="skeleton sk-line short" style="width:40px;height:28px;margin-bottom:10px;"></div>
          <div class="skeleton sk-line short" style="width:130px;"></div>
        </div>
      </div>
      <div class="skeleton sk-count"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line short"></div>
    </div>
    <div class="card" id="skel4">
      <div class="card-header">
        <div>
          <div class="skeleton sk-line short" style="width:40px;height:28px;margin-bottom:10px;"></div>
          <div class="skeleton sk-line short" style="width:150px;"></div>
        </div>
      </div>
      <div class="skeleton sk-count"></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line short"></div>
    </div>
  </div>

</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
  const AUTO_REFRESH_SEC = 3600; // 1시간 자동 갱신
  let countdown = AUTO_REFRESH_SEC;
  let autoTimer, countdownTimer;

  // ─── 데이터 로드 ───
  async function loadData(force = false) {
    if (force) {
      // 강제 새로고침 시 우선 서버에 갱신 호출
      try { await fetch('/api/refresh', { method: 'POST' }); } catch(e) {}
    }

    setBtnLoading(true);
    let data = null; // 스코프를 finally까지 확장
    try {
      const res = await fetch('/api/status');
      data = await res.json();
      render(data);
      
      // 만약 서버가 업데이트 중이라면, 5초 뒤에 다시 확인하도록 예약
      if (data.is_updating) {
        setTimeout(() => loadData(false), 5000);
      }
    } catch(e) {
      showToast('❌ 서버 연결 실패. 서버가 실행 중인지 확인하세요.', 4000);
    } finally {
      if (!data?.is_updating) setBtnLoading(false);
    }
  }

  function refresh() { resetAutoTimer(); loadData(true); }

  // ─── 기준 초기화 ───
  async function resetBaseline() {
    if (!confirm('기준 게시글 정보를 초기화합니다.\n다음 갱신 시 새 글 카운트가 0으로 리셋됩니다.\n계속하시겠습니까?')) return;
    await fetch('/api/reset', { method: 'POST' });
    showToast('✅ 기준 초기화 완료. 새로고침합니다…');
    setTimeout(() => { resetAutoTimer(); loadData(true); }, 1200);
  }

  // ─── 렌더링 ───
  function render(data) {
    // 스켈레톤 제거 (4개)
    ['skel1','skel2','skel3','skel4'].forEach(id => { const el = document.getElementById(id); if(el) el.remove(); });

    const isUpdating = data.is_updating;
    document.getElementById('updatingIndicator').style.display = isUpdating ? 'flex' : 'none';

    const lastTime = data.checked_at === '-' ? '확인 대기 중' : `마지막 확인: ${data.checked_at}`;
    document.getElementById('lastCheck').textContent = lastTime;
    document.getElementById('statTime').textContent  = (data.checked_at && data.checked_at !== '-') ? data.checked_at.slice(11, 16) : '--:--';

    const totalNew = data.sites.reduce((s, x) => s + (x.new_count || 0), 0);
    document.getElementById('statTotal').textContent = totalNew;
    document.getElementById('statSites').textContent = data.sites.length;
    document.getElementById('statsBar').style.display = 'flex';

    const container = document.getElementById('cards');

    data.sites.forEach(site => {
      let card = document.getElementById('card-' + site.id);

      // 카드 뼈대가 없으면 생성
      if (!card) {
        card = document.createElement('div');
        card.className = 'card';
        card.id = 'card-' + site.id;
        card.setAttribute('data-id', site.id);
        card.innerHTML = `
          <div class="card-header">
            <div>
              <div class="card-icon">${site.icon}</div>
              <div class="card-name">${site.name}</div>
              <div class="card-url">${new URL(site.url).hostname}</div>
            </div>
          </div>
          <div class="new-count-wrap" id="count-wrap-${site.id}">
            <div class="new-count-label">신규 게시글</div>
            <div class="count-content" id="count-content-${site.id}">
              <div class="skeleton sk-count"></div>
            </div>
          </div>
          <div class="items-wrap" id="items-wrap-${site.id}"></div>
          <div class="card-footer">
            <div class="total-count" id="total-${site.id}">전체 0개 게시글</div>
            <a class="visit-link" href="${site.url}" target="_blank" rel="noopener">
              사이트 방문 <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
          </div>
        `;
        container.appendChild(card);
      }

      // 데이터 채우기 (Partial Update) - 사이트 데이터가 있는 경우에만
      const hasNew = site.new_count > 0;
      const isErr  = !!site.error;
      
      const countContent = document.getElementById(`count-content-${site.id}`);
      const itemsWrap    = document.getElementById(`items-wrap-${site.id}`);
      const totalText   = document.getElementById(`total-${site.id}`);

      if (isErr) {
        countContent.innerHTML = `<div class="new-count is-error">오류</div><div class="error-msg">${site.error}</div>`;
      } else if (site.total > 0 || (site.num !== undefined)) {
        countContent.innerHTML = `
          <a class="new-count-link" href="${site.url}" target="_blank" rel="noopener" title="${site.name} 바로가기">
            <div class="new-count ${hasNew ? 'has-new' : ''}">${site.new_count}</div>
          </a>`;
        itemsWrap.innerHTML = renderItems(site);
        totalText.textContent = `전체 ${site.total}개 게시글`;
      }
    });

    if (totalNew > 0 && !isUpdating) {
      showToast(`🔔 총 ${totalNew}건의 새 게시글이 있습니다!`, 3500);
    }
  }

  function renderItems(site) {
    if (site.new_count === 0) {
      return `<div class="no-new-msg"><span class="check-icon">✅</span> 새 게시글 없음</div>`;
    }
    const items = site.new_items || [];
    const rows  = items.map((item, i) => `
      <div class="new-item" style="animation-delay:${i * 0.05}s">
        <div class="new-item-dot"></div>
        <a href="${item.url || site.url}" target="_blank" rel="noopener">${item.title}</a>
        <span class="new-item-date">${item.date}</span>
      </div>`).join('');
    return `<div class="new-items">${rows}
      ${site.new_count > items.length
        ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px;">외 ${site.new_count - items.length}건 더보기 → <a href="${site.url}" target="_blank" style="color:var(--blue);text-decoration:none;">사이트 방문</a></div>`
        : ''}
    </div>`;
  }

  // ─── 자동 갱신 타이머 ───
  function resetAutoTimer() {
    clearInterval(autoTimer);
    clearInterval(countdownTimer);
    countdown = AUTO_REFRESH_SEC;
    updateCountdown();

    countdownTimer = setInterval(() => {
      countdown = Math.max(0, countdown - 1);
      updateCountdown();
    }, 1000);

    autoTimer = setInterval(() => {
      countdown = AUTO_REFRESH_SEC;
      loadData(true);
    }, AUTO_REFRESH_SEC * 1000);
  }

  function updateCountdown() {
    const pct = (countdown / AUTO_REFRESH_SEC) * 100;
    document.getElementById('autoBar').style.width = pct + '%';
    document.getElementById('autoCountdown').textContent =
      countdown >= 60 ? Math.ceil(countdown/60) + 'm' : countdown + 's';
  }

  // ─── 버튼 로딩 상태 ───
  function setBtnLoading(on) {
    const btn  = document.getElementById('btnRefresh');
    const icon = document.getElementById('refreshIcon');
    btn.disabled = on;
    icon.className = on ? 'spin' : '';
    icon.textContent = on ? '↻' : '↻';
    
    // 카드 내용 로딩 효과 추가
    document.querySelectorAll('.new-count-wrap').forEach(el => {
      if (on) el.style.opacity = '0.5';
      else el.style.opacity = '1';
    });
  }

  // ─── 토스트 ───
  function showToast(msg, ms = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  // ─── 초기 실행 ───
  loadData();
  resetAutoTimer();
</script>
