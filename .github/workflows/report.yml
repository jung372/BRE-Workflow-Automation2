name: Teams 정기 보고 (평일 09:00 KST)

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 평일 09:00 KST (= UTC 00:00)
  workflow_dispatch:          # 수동 실행
    inputs:
      force_send:
        description: '조건 무시하고 강제 발송 (신규글 0건 + 계측기 정상이어도 발송)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read             # last_state.json, data/status.json 읽기만 필요

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: pip install requests

      - name: 🔔 Teams 알림 발송
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          DASHBOARD_URL: https://jung372.github.io/BRE-Workflow-Automation2/
          FORCE_SEND: ${{ inputs.force_send }}
        run: python notify_teams.py
