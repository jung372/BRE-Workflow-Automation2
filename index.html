<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주요 사이트 게시글 업데이트 모니터링</title>
  <meta name="description" content="기후에너지환경부 전기위원회 공지사항 신규 게시글 모니터링 대시보드" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --baywa-green: #8fc31f; /* BayWa signature green */
      --baywa-dk-green: #007a33;
      --baywa-white: rgba(255, 255, 255, 0.95);
      
      /* Glassmorphism Variables */
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-blur: blur(16px);
      --glass-hover: rgba(255, 255, 255, 0.15);

      --text: #ffffff;
      --text-muted: #e2e8f0;
      --text-dark: #1e293b;
      
      --blue: #3b82f6;
      --green: #2ecc71;
      --amber: #f59e0b;
      --red: #ef4444;
      
      --radius: 20px;
      --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    body {
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      
      /* Background setup with generated image */
      background: url('assets/bg.png') no-repeat center center fixed;
      background-size: cover;
    }

    /* Dark overlay for better readability */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px 32px;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 30px; }
    .header-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--baywa-green);
      color: var(--baywa-green);
      border-radius: 999px;
      font-size: 12px; font-weight: 600; padding: 6px 16px;
      margin-bottom: 16px;
      animation: fadeSlideDown .5s ease both;
      box-shadow: 0 4px 12px rgba(143, 195, 31, 0.2);
    }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--baywa-green);
      box-shadow: 0 0 10px var(--baywa-green);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.7); }
    }
    h1 {
      font-size: clamp(24px, 4vw, 36px); font-weight: 700; letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      animation: fadeSlideDown .6s ease .1s both;
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--text-muted); font-size: 15px; font-weight: 300;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      animation: fadeSlideDown .6s ease .2s both;
    }

    /* ── Actions Badge ── */
    .actions-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      color: var(--baywa-white); border-radius: 999px;
      font-size: 12px; font-weight: 400; padding: 4px 14px;
      margin-top: 12px;
      animation: fadeSlideDown .6s ease .3s both;
    }

    /* ── Control Bar ── */
    .control-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 10px 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      animation: fadeSlideDown .5s ease .4s both;
    }
    .last-check { font-size: 14px; color: var(--baywa-white); display: flex; align-items: center; gap: 8px; font-weight: 500; }
    .last-check .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 8px var(--green); }
    
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: all .3s;
      outline: none;
    }
    .btn-primary { 
      background: linear-gradient(135deg, var(--baywa-green) 0%, var(--baywa-dk-green) 100%); 
      color: #fff; 
      box-shadow: 0 4px 15px rgba(143, 195, 31, 0.4);
    }
    .btn-primary:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 20px rgba(143, 195, 31, 0.6);
      background: linear-gradient(135deg, #a4d23a 0%, var(--baywa-dk-green) 100%);
    }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none !important; }
    
    .spin { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex; gap: 20px; flex-wrap: wrap;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 18px 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      animation: fadeSlideUp .5s ease .25s both;
    }
    .stat { flex: 1; min-width: 120px; border-right: 1px solid rgba(255,255,255,0.1); }
    .stat:last-child { border-right: none; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 18px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: var(--baywa-green); }

    /* ── Card Grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: rgba(20, 25, 30, 0.5);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 24px;
      position: relative; overflow: hidden;
      transition: all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      animation: fadeSlideUp .5s ease both;
      box-shadow: var(--shadow);
    }
    .card:nth-child(2) { animation-delay: .1s; }
    .card:nth-child(3) { animation-delay: .15s; }
    .card:nth-child(4) { animation-delay: .2s; }
    
    .card:hover { 
      transform: translateY(-8px); 
      background: rgba(30, 40, 45, 0.6);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.4);
    }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: line-gradient(90deg, var(--baywa-green), var(--baywa-dk-green));
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .card[data-id="result"]::before { background: linear-gradient(90deg, var(--baywa-green), #2ecc71); }
    .card[data-id="notice"]::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .card[data-id="nie_notice"]::before { background: linear-gradient(90deg, #eab308, #facc15); }
    .card[data-id="kepco_notice"]::before { background: linear-gradient(90deg, #f97316, #fb923c); }
    .card[data-id="eiass_wind"]::before { background: linear-gradient(90deg, #0ea5e9, #38bdf8); }
    .card[data-id="news"]::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .card[data-id="metmast"]::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }

    /* 대시보드 강제 정렬 순서 */
    .card[data-id="metmast"] { order: 1; }
    .card[data-id="notice"] { order: 2; }
    .card[data-id="result"] { order: 3; }
    .card[data-id="kepco_notice"] { order: 4; }
    .card[data-id="eiass_wind"] { order: 5; }
    .card[data-id="nie_notice"] { order: 6; }
    .card { order: 99; } /* 기본 위치 (그 외 카드) */

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    .card-icon { font-size: 36px; line-height: 1; margin-bottom: 12px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
    .card-name { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .card-url  { font-size: 13px; color: var(--text-muted); opacity: 0.8; }

    .new-count-wrap { margin-bottom: 16px; background: rgba(0,0,0,0.2); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
    .new-count-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .new-count {
      font-size: 38px; font-weight: 800; line-height: 1;
      color: var(--text);
      transition: color .3s;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
    }
    .new-count.has-new { color: var(--amber); text-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
    .new-count.is-error { color: var(--red); font-size: 24px; }

    .new-count-link {
      display: inline-block;
      text-decoration: underline;
      text-decoration-color: rgba(255,255,255,0.3);
      text-decoration-thickness: 3px;
      text-underline-offset: 6px;
      color: inherit;
      cursor: pointer;
      transition: all .2s;
    }
    .new-count-link:hover { transform: scale(1.05); text-decoration-color: var(--amber); }

    .new-items { margin-top: 16px; }
    .new-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      animation: fadeSlideRight .4s ease both;
    }
    .new-item:last-child { border-bottom: none; }
    .new-item-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); flex-shrink: 0; margin-top: 6px; box-shadow: 0 0 6px var(--amber); }
    .new-item a {
      font-size: 14px; color: var(--text); text-decoration: none; font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }
    .new-item a:hover { color: var(--baywa-green); }
    .new-item-date { font-size: 12px; color: var(--text-muted); flex-shrink: 0; margin-top: 2px; }

    .no-new-msg { font-size: 15px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .error-msg { font-size: 13px; color: var(--red); margin-top: 8px; }

    .card-footer { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
    .total-count { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .visit-link {
      font-size: 12px; color: var(--text); text-decoration: none; font-weight: 600;
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 8px;
      transition: all .2s;
    }
    .visit-link:hover { background: var(--baywa-green); color: #fff; box-shadow: 0 4px 12px rgba(143, 195, 31, 0.3); }

    /* ── Progress Bar ── */
    .auto-bar-wrap { display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--baywa-white); font-weight: 500; }
    .auto-bar-bg { flex: 1; width: 140px; height: 6px; background: rgba(0,0,0,0.3); border-radius: 999px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .auto-bar-fill { height: 100%; background: var(--baywa-green); border-radius: 999px; width: 100%; transition: width 1s linear; box-shadow: 0 0 10px var(--baywa-green); }

    /* ── Skeleton Loaders ── */
    .skeleton {
      border-radius: 6px; overflow: hidden;
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .sk-count { height: 40px; width: 80px; margin-bottom: 12px; border-radius: 8px; }
    .sk-line  { height: 14px; width: 100%; margin-bottom: 8px; }
    .sk-line.short { width: 60%; }

    /* ── Toast Notification ── */
    #toast {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(20, 25, 30, 0.9); border: 1px solid var(--baywa-green);
      backdrop-filter: var(--glass-blur);
      color: #fff; padding: 14px 28px; border-radius: 999px;
      font-size: 15px; font-weight: 600; opacity: 0; transition: all .3s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
      pointer-events: none; z-index: 999;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 20px rgba(143, 195, 31, 0.2);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Animations ── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideRight {
      from { opacity: 0; transform: translateX(-15px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    footer { 
      text-align: center; color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 40px; 
      animation: fadeSlideUp .5s ease .5s both; padding-bottom: 40px; 
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    footer a { color: var(--baywa-green); text-decoration: none; font-weight: 500; }
    footer a:hover { color: #fff; text-decoration: underline; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="header-badge"><div class="pulse-dot"></div> 실시간 모니터링 활성</div>
    <h1>주요 사이트 공지 모니터링 대시보드</h1>


  </header>

  <!-- Combined Control & Stats Bar -->
  <div class="control-bar" id="statsBar">
    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <div class="stat" style="border:none;">
        <div class="stat-label">전체 신규 게시글</div>
        <div class="stat-value amber" id="statTotal">0</div>
      </div>
      <div class="stat" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 12px;">
        <div class="stat-label">모니터링 사이트</div>
        <div class="stat-value green" id="statSites">0</div>
      </div>
      <div class="stat" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 12px;">
        <div class="stat-label">마지막 확인</div>
        <div class="stat-value" style="font-size:14px; color:var(--text); display:flex; align-items:center;">
          <span id="statTime" style="white-space: nowrap;">—</span>
          <span style="font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.8); margin-left: 8px; white-space: nowrap;">⚡ 매 1시간마다 자동 갱신</span>
        </div>
      </div>
    </div>
    
    <div style="display:flex;gap:12px;align-items:center;flex-wrap: nowrap;">
      <div class="auto-bar-wrap">
        <span style="font-size:11px;">화면갱신</span>
        <div class="auto-bar-bg"><div class="auto-bar-fill" id="autoBar"></div></div>
        <span id="autoCountdown" style="min-width: 30px; text-align:right; font-size:11px;">60s</span>
      </div>
      <button class="btn btn-primary" id="btnRefresh" onclick="refresh()" style="padding: 6px 12px; font-size: 12px;">
        <span id="refreshIcon" style="font-size:14px;">↻</span> 새로고침
      </button>
    </div>
  </div>

  <!-- Cards Area -->
  <div class="cards" id="cards">
    <!-- Skeletons (4) -->
    <div class="card" id="skel1">
      <div class="card-header"><div>
        <div class="skeleton sk-line short" style="width:40px;height:36px;margin-bottom:12px;"></div>
        <div class="skeleton sk-line short" style="width:140px;height:18px;"></div>
      </div></div>
      <div class="new-count-wrap"><div class="skeleton sk-count"></div></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line short"></div>
    </div>
    <div class="card" id="skel2">
      <div class="card-header"><div>
        <div class="skeleton sk-line short" style="width:40px;height:36px;margin-bottom:12px;"></div>
        <div class="skeleton sk-line short" style="width:160px;height:18px;"></div>
      </div></div>
      <div class="new-count-wrap"><div class="skeleton sk-count"></div></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line short"></div>
    </div>
    <div class="card" id="skel3">
      <div class="card-header"><div>
        <div class="skeleton sk-line short" style="width:40px;height:36px;margin-bottom:12px;"></div>
        <div class="skeleton sk-line short" style="width:150px;height:18px;"></div>
      </div></div>
      <div class="new-count-wrap"><div class="skeleton sk-count"></div></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line short"></div>
    </div>
    <div class="card" id="skel4">
      <div class="card-header"><div>
        <div class="skeleton sk-line short" style="width:40px;height:36px;margin-bottom:12px;"></div>
        <div class="skeleton sk-line short" style="width:130px;height:18px;"></div>
      </div></div>
      <div class="new-count-wrap"><div class="skeleton sk-count"></div></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line short"></div>
    </div>
    <div class="card" id="skel5">
      <div class="card-header"><div>
        <div class="skeleton sk-line short" style="width:40px;height:36px;margin-bottom:12px;"></div>
        <div class="skeleton sk-line short" style="width:140px;height:18px;"></div>
      </div></div>
      <div class="new-count-wrap"><div class="skeleton sk-count"></div></div>
      <div class="skeleton sk-line"></div>
      <div class="skeleton sk-line short"></div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<footer>
  KOREC Monitoring Dashboard &nbsp;·&nbsp;
  Automated by GitHub Actions &nbsp;·&nbsp;
  <a href="https://www.korec.go.kr" target="_blank" rel="noopener">korec.go.kr</a>
</footer>

<script>
  const DATA_URL         = 'data/status.json';
  const AUTO_REFRESH_SEC = 300;
  let countdown  = AUTO_REFRESH_SEC;
  let autoTimer, countdownTimer;

  async function loadData() {
    setBtnLoading(true);
    let data = null;
    try {
      const res = await fetch(DATA_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
      render(data);
    } catch(e) {
      showToast('❌ 데이터 로드 실패. 잠시 후 다시 시도하세요.', 4000);
    } finally {
      setBtnLoading(false);
    }
  }

  function refresh() { resetAutoTimer(); loadData(); }

  function render(data) {
    ['skel1','skel2','skel3','skel4','skel5'].forEach(id => {
      const el = document.getElementById(id); if(el) el.remove();
    });

    const isFirstTime = !data.checked_at || data.checked_at === '-';
    document.getElementById('statTime').textContent  = isFirstTime ? '--:--' : data.checked_at.slice(0, 16);

    const totalNew = data.sites.reduce((s, x) => s + (x.new_count || 0), 0);
    document.getElementById('statTotal').textContent = totalNew;
    document.getElementById('statSites').textContent = data.sites.length;
    document.getElementById('statsBar').style.display = 'flex';

    const container = document.getElementById('cards');

    data.sites.forEach(site => {
      let card = document.getElementById('card-' + site.id);

      if (!card) {
        card = document.createElement('div');
        card.className = 'card';
        card.id = 'card-' + site.id;
        card.setAttribute('data-id', site.id);
        let hostname = site.url;
        try { hostname = new URL(site.url).hostname; } catch(e) {}
        card.innerHTML = `
          <div class="card-header">
            <div style="display: flex; align-items: center; gap: 12px;">
              <div class="card-icon" style="margin-bottom: 0;">${site.icon || '📌'}</div>
              <div>
                <div class="card-name">${site.name}</div>
                <div class="card-url">${hostname}</div>
              </div>
            </div>
          </div>
          <div class="new-count-wrap" id="count-wrap-${site.id}">
            <div class="new-count-label">신규 등록 게시글</div>
            <div class="count-content" id="count-content-${site.id}">
              <div class="skeleton sk-count"></div>
            </div>
          </div>
          <div class="items-wrap" id="items-wrap-${site.id}"></div>
          <div class="card-footer">
            <div class="total-count" id="total-${site.id}">전체 0개</div>
            <a class="visit-link" href="${site.url}" target="_blank" rel="noopener">
              방문하기 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
          </div>
        `;
        container.appendChild(card);
      }

      const hasNew = site.new_count > 0;
      const isErr  = !!site.error;
      const countContent = document.getElementById(`count-content-${site.id}`);
      const itemsWrap    = document.getElementById(`items-wrap-${site.id}`);
      const totalText    = document.getElementById(`total-${site.id}`);

      if (isErr) {
        countContent.innerHTML = `<div class="new-count is-error">오류</div><div class="error-msg">${site.error}</div>`;
      } else {
        countContent.innerHTML = `
          <a class="new-count-link" href="${site.url}" target="_blank" rel="noopener" title="바로가기">
            <div class="new-count ${hasNew ? 'has-new' : ''}">${site.new_count}</div>
          </a>`;
        itemsWrap.innerHTML = renderItems(site);
        totalText.textContent = `총 확보 ${site.total || 0}건 데이터`;
      }
    });

    if (totalNew > 0) {
      showToast(`✨ 총 ${totalNew}건의 새 게시글이 감지되었습니다!`, 4000);
    }
    
    // 풍황계측기 목업 대시보드 강제 주입 (Visually Only)
    let mockCard = document.getElementById('card-metmast');
    if (!mockCard) {
      mockCard = document.createElement('div');
      mockCard.className = 'card';
      mockCard.id = 'card-metmast';
      mockCard.setAttribute('data-id', 'metmast');
      
      mockCard.innerHTML = `
        <div class="card-header" style="margin-bottom: 8px; padding-bottom: 8px;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div class="card-icon" style="margin-bottom: 0; font-size: 36px;">📡</div>
            <div>
              <div class="card-name">풍황계측기 모니터링</div>
            </div>
          </div>
        </div>
        <div class="new-count-wrap" style="padding: 10px 14px; margin-bottom: 0; background: transparent; border: none;">
          <div style="display: flex; flex-direction: column; gap: 6px;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
              <div style="font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 1px;">SIRU</div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 11px; font-weight: 600; color: var(--green);">정상 접속 (Online)</span>
                <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite;"></div>
              </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
              <div style="font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 1px;">GOGK</div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 11px; font-weight: 600; color: var(--green);">정상 접속 (Online)</span>
                <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; animation-delay: 0.5s;"></div>
              </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
              <div style="font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 1px;">BLMU</div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 11px; font-weight: 600; color: var(--red);">접속 끊김 (Offline)</span>
                <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.6);"></div>
              </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
              <div style="font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 1px;">DKAM</div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 11px; font-weight: 600; color: var(--green);">정상 접속 (Online)</span>
                <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; animation-delay: 1s;"></div>
              </div>
            </div>
            
          </div>
        </div>
        <div class="card-footer" style="margin-top: 2px;">
          <div class="total-count" id="total-metmast">현재 접속 가능 기기: 3/4대</div>
          <a class="visit-link" href="#" target="_blank" rel="noopener">
            연동하기 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
        </div>
      `;
      container.appendChild(mockCard);
    }
  }

  function renderItems(site) {
    if (site.new_count === 0) {
      return `<div class="no-new-msg"><span style="font-size:18px;">✅</span> 새 게시글 없음</div>`;
    }
    const items = (site.new_items || []).slice(0, 5);
    const rows  = items.map((item, i) => `
      <div class="new-item" style="animation-delay:${i * 0.05}s">
        <div class="new-item-dot"></div>
        <div>
          <a href="${item.url || site.url}" target="_blank" rel="noopener">${item.title}</a>
          <div class="new-item-date">${item.date || ''}</div>
        </div>
      </div>`).join('');
    return `<div class="new-items">${rows}
      ${site.new_count > items.length
        ? `<div style="font-size:13px;color:rgba(255,255,255,0.7);margin-top:10px;text-align:right;">외 ${site.new_count - items.length}건 더보기 →</div>`
        : ''}
    </div>`;
  }

  function resetAutoTimer() {
    clearInterval(autoTimer);
    clearInterval(countdownTimer);
    countdown = AUTO_REFRESH_SEC;
    updateCountdown();

    countdownTimer = setInterval(() => {
      countdown = Math.max(0, countdown - 1);
      updateCountdown();
    }, 1000);

    autoTimer = setInterval(() => {
      countdown = AUTO_REFRESH_SEC;
      loadData();
    }, AUTO_REFRESH_SEC * 1000);
  }

  function updateCountdown() {
    const pct = (countdown / AUTO_REFRESH_SEC) * 100;
    document.getElementById('autoBar').style.width = pct + '%';
    document.getElementById('autoCountdown').textContent =
      countdown >= 60 ? Math.ceil(countdown/60) + 'm' : countdown + 's';
  }

  function setBtnLoading(on) {
    const btn  = document.getElementById('btnRefresh');
    const icon = document.getElementById('refreshIcon');
    btn.disabled = on;
    icon.className = on ? 'spin' : '';
  }

  function showToast(msg, ms = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  loadData();
  resetAutoTimer();
</script>
</body>
</html>
